<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>YOLO + ToF Detector</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');

  :root {
    --green:   #00ff88;
    --cyan:    #00e5ff;
    --red:     #ff3d5a;
    --yellow:  #ffe500;
    --bg:      #050a0e;
    --panel:   rgba(0,255,136,0.06);
    --border:  rgba(0,255,136,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HUD bar ── */
  #hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: rgba(0,0,0,0.7);
    border-bottom: 1px solid var(--border);
    z-index: 10;
    flex-shrink: 0;
    gap: 8px;
  }

  .hud-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 70px;
  }
  .hud-label { font-size: 9px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
  .hud-value { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; line-height: 1; }
  #valFps    { color: var(--green); }
  #valDist   { color: var(--yellow); }
  #valObjs   { color: var(--cyan); }

  /* status pill */
  #statusBar {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--panel);
    white-space: nowrap;
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: center;
    transition: color 0.3s;
  }

  /* ── Camera area ── */
  #camWrap {
    position: relative;
    flex: 1;
    overflow: hidden;
  }

  #video {
    position: absolute;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  #canvas {
    position: absolute;
    width: 100%; height: 100%;
    top: 0; left: 0;
  }

  /* ── Corner scan lines ── */
  .corner {
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--green);
    border-style: solid;
    opacity: 0.6;
    z-index: 5;
  }
  .tl { top: 8px; left: 8px;  border-width: 2px 0 0 2px; }
  .tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
  .bl { bottom: 8px; left: 8px;  border-width: 0 0 2px 2px; }
  .br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  /* scan line animation */
  #scanLine {
    position: absolute;
    left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.3;
    animation: scan 3s linear infinite;
    z-index: 4;
    pointer-events: none;
  }
  @keyframes scan { from { top: 0% } to { top: 100% } }

  /* ── Bottom buttons ── */
  #controls {
    display: flex;
    gap: 10px;
    padding: 8px 12px;
    background: rgba(0,0,0,0.7);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  button {
    flex: 1;
    padding: 10px 6px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s, color 0.2s;
    text-transform: uppercase;
  }
  button:active { background: rgba(0,255,136,0.2); }
  button.danger  { border-color: rgba(255,61,90,0.4); color: var(--red); }
  button.active  { background: rgba(0,255,136,0.15); color: #fff; }

  /* Loading overlay */
  #loader {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    gap: 16px;
  }
  #loader h1 { font-family: 'Rajdhani', sans-serif; font-size: 28px; letter-spacing: 4px; color: var(--green); }
  #loaderMsg { font-size: 12px; color: #555; letter-spacing: 2px; }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg) } }

  /* toast */
  #toast {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    border: 1px solid var(--border);
    color: var(--cyan);
    padding: 8px 16px;
    border-radius: 4px;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 50;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loader">
  <div class="spinner"></div>
  <h1>YOLO + TOF</h1>
  <div id="loaderMsg">Loading AI model...</div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-cell">
    <span class="hud-label">FPS</span>
    <span class="hud-value" id="valFps">--</span>
  </div>
  <div class="hud-cell">
    <span class="hud-label">Distance</span>
    <span class="hud-value" id="valDist">-- mm</span>
  </div>
  <div class="hud-cell">
    <span class="hud-label">Objects</span>
    <span class="hud-value" id="valObjs">0</span>
  </div>
  <div id="statusBar">Initialising...</div>
</div>

<!-- Camera + overlay -->
<div id="camWrap">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="scanLine"></div>
</div>

<!-- Controls -->
<div id="controls">
  <button id="btnCam"   onclick="startCamera()">📷 Camera</button>
  <button id="btnUsb"   onclick="connectUsb()">🔌 Connect Arduino</button>
  <button id="btnFlip"  onclick="flipCamera()">🔄 Flip</button>
</div>

<div id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let model       = null;
let videoStream = null;
let usbPort     = null;
let usbReader   = null;
let facingMode  = 'environment';   // back camera by default
let distance    = 0;
let detecting   = false;
let lastTime    = performance.now();
let fpsFilter   = 0;
let lineBuffer  = '';

const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');

// Class colours — one per COCO class for nice visuals
const CLASS_COLORS = {};
function classColor(label) {
  if (!CLASS_COLORS[label]) {
    let h = 0;
    for (let c of label) h = (h * 31 + c.charCodeAt(0)) % 360;
    CLASS_COLORS[label] = `hsl(${h},90%,55%)`;
  }
  return CLASS_COLORS[label];
}

// ─── Load model ──────────────────────────────────────────────────────────────
async function init() {
  setLoaderMsg('Loading COCO-SSD model…');
  try {
    model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
    setLoaderMsg('Starting camera…');
    await startCamera();
    document.getElementById('loader').style.display = 'none';
    setStatus('Model ready ✓', 'var(--green)');
  } catch(e) {
    setLoaderMsg('Error: ' + e.message);
  }
}

// ─── Camera ──────────────────────────────────────────────────────────────────
async function startCamera() {
  if (videoStream) videoStream.getTracks().forEach(t => t.stop());
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = videoStream;
    await video.play();
    document.getElementById('btnCam').classList.add('active');
    requestAnimationFrame(detectLoop);
  } catch(e) {
    toast('Camera error: ' + e.message);
  }
}

function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
}

// ─── Detection loop ──────────────────────────────────────────────────────────
async function detectLoop() {
  if (!model || video.readyState < 2) { requestAnimationFrame(detectLoop); return; }
  if (detecting) { requestAnimationFrame(detectLoop); return; }
  detecting = true;

  // Resize canvas to video display size
  const vw = video.clientWidth, vh = video.clientHeight;
  if (canvas.width !== vw || canvas.height !== vh) { canvas.width = vw; canvas.height = vh; }

  // Run inference
  const predictions = await model.detect(video);

  // Draw
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of predictions) {
    const [x, y, w, h] = p.bbox;
    const sx = vw / video.videoWidth, sy = vh / video.videoHeight;
    const bx = x*sx, by = y*sy, bw = w*sx, bh = h*sy;
    const col = classColor(p.class);
    const conf = Math.round(p.score * 100);

    // Box
    ctx.strokeStyle = col;
    ctx.lineWidth   = 2.5;
    ctx.strokeRect(bx, by, bw, bh);

    // Corner accents
    const cs = 12;
    ctx.lineWidth = 3;
    [[bx,by],[bx+bw,by],[bx,by+bh],[bx+bw,by+bh]].forEach(([cx,cy],i) => {
      ctx.beginPath();
      ctx.moveTo(cx + (i%2===0?cs:-cs), cy);
      ctx.lineTo(cx, cy);
      ctx.lineTo(cx, cy + (i<2?cs:-cs));
      ctx.strokeStyle = col;
      ctx.stroke();
    });

    // Label
    const label = `${p.class}  ${conf}%`;
    ctx.font = 'bold 13px "Share Tech Mono", monospace';
    const tw = ctx.measureText(label).width + 12;
    ctx.fillStyle = col + 'cc';
    ctx.fillRect(bx, by > 22 ? by - 22 : by, tw, 20);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, bx + 6, by > 22 ? by - 6 : by + 14);

    // Distance overlay on first/largest box
    if (predictions.indexOf(p) === 0 && distance > 0) {
      const dl = `${distance} mm`;
      ctx.font = 'bold 22px "Rajdhani", sans-serif';
      const dw = ctx.measureText(dl).width;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(bx + bw/2 - dw/2 - 6, by + bh/2 - 18, dw + 12, 28);
      ctx.fillStyle = '#ffe500';
      ctx.fillText(dl, bx + bw/2 - dw/2, by + bh/2 + 6);
    }
  }

  // FPS
  const now = performance.now();
  const raw = 1000 / (now - lastTime);
  fpsFilter = fpsFilter * 0.85 + raw * 0.15;
  lastTime  = now;
  document.getElementById('valFps').textContent  = Math.round(fpsFilter);
  document.getElementById('valObjs').textContent = predictions.length;

  detecting = false;
  requestAnimationFrame(detectLoop);
}

// ─── WebUSB — Arduino serial ──────────────────────────────────────────────────
async function connectUsb() {
  if (!navigator.usb) {
    toast('WebUSB not supported. Use Chrome on Android.');
    return;
  }
  try {
    // Ask user to pick the Arduino
    usbPort = await navigator.usb.requestDevice({ filters: [
      { vendorId: 0x1A86 },   // CH340 (most cheap Nano clones)
      { vendorId: 0x0403 },   // FTDI
      { vendorId: 0x2341 },   // Arduino genuine
    ]});
    await usbPort.open();
    await usbPort.selectConfiguration(1);
    await usbPort.claimInterface(0);
    setStatus('Arduino connected ✓', 'var(--green)');
    document.getElementById('btnUsb').classList.add('active');
    document.getElementById('btnUsb').textContent = '🔌 Disconnect';
    document.getElementById('btnUsb').onclick = disconnectUsb;
    readUsbLoop();
  } catch(e) {
    if (e.name !== 'NotFoundError') toast('USB: ' + e.message);
  }
}

async function readUsbLoop() {
  // Use bulk transfer endpoint 0x81 (IN) — standard for CH340/FTDI
  // Reads raw bytes and assembles "DIST:xxx\n" lines
  const ENDPOINT = 0x81;
  try {
    while (usbPort && usbPort.opened) {
      const result = await usbPort.transferIn(ENDPOINT, 64);
      if (!result.data) continue;
      const chunk = new TextDecoder().decode(result.data);
      lineBuffer += chunk;
      let nl;
      while ((nl = lineBuffer.indexOf('\n')) >= 0) {
        const line = lineBuffer.slice(0, nl).trim();
        lineBuffer  = lineBuffer.slice(nl + 1);
        if (line.startsWith('DIST:')) {
          const d = parseInt(line.slice(5));
          if (!isNaN(d) && d > 0 && d <= 4000) {
            distance = d;
            document.getElementById('valDist').textContent = d + ' mm';
          } else {
            document.getElementById('valDist').textContent = '-- mm';
          }
        }
      }
    }
  } catch(e) {
    setStatus('Arduino disconnected', 'var(--red)');
    document.getElementById('valDist').textContent = '-- mm';
  }
}

async function disconnectUsb() {
  if (usbPort) { try { await usbPort.close(); } catch(_){} usbPort = null; }
  distance = 0;
  document.getElementById('valDist').textContent = '-- mm';
  document.getElementById('btnUsb').classList.remove('active');
  document.getElementById('btnUsb').textContent = '🔌 Connect Arduino';
  document.getElementById('btnUsb').onclick = connectUsb;
  setStatus('Arduino disconnected', 'var(--red)');
}

// ─── UI helpers ──────────────────────────────────────────────────────────────
function setLoaderMsg(msg) { document.getElementById('loaderMsg').textContent = msg; }
function setStatus(msg, color) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.style.color = color || 'var(--green)';
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.style.opacity = '0', 3000);
}

// ─── Boot ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
